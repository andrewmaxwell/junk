<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Junk made by Andrew</title>
    <meta name="description" content="A portfolio of creative coding projects, physics simulations, and games made by Andrew.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0f1115;
        --surface-color: #1a1d24;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --border-color: #2b303b;
        --accent-color: #3b82f6;
        --hover-highlight: #252a36;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Ambient Background Glow */
      body::before, body::after {
        content: '';
        position: fixed;
        width: 60vw;
        height: 60vw;
        max-width: 800px;
        max-height: 800px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: -1;
        pointer-events: none;
        opacity: 0.12;
      }
      body::before {
        top: -20%;
        left: -10%;
        background: #3b82f6;
      }
      body::after {
        bottom: -20%;
        right: -10%;
        background: #8b5cf6;
      }

      main {
        max-width: 1400px;
        margin: 0 auto;
        padding: 60px 20px;
      }

      .controls {
        margin-bottom: 40px;
        display: flex;
        justify-content: center;
      }

      .search-wrapper {
        position: relative;
        width: 100%;
        max-width: 480px;
      }

      .search-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        color: #6b7280;
        pointer-events: none;
        transition: color 0.2s ease;
        z-index: 2;
      }

      .search-wrapper:focus-within .search-icon {
        color: var(--accent-color);
      }

      #searchInput {
        width: 100%;
        padding: 16px 24px 16px 54px;
        border-radius: 100px;
        border: 1px solid var(--border-color);
        background-color: rgba(26, 29, 36, 0.7);
        backdrop-filter: blur(10px);
        color: var(--text-primary);
        font-size: 1.05rem;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        box-sizing: border-box;
      }

      #searchInput::placeholder {
        color: #6b7280;
      }

      #searchInput:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25), 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        background-color: rgba(31, 34, 42, 0.85);
      }

      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
      }

      @media (max-width: 1100px) {
        .container { grid-template-columns: repeat(3, 1fr); }
      }
      
      @media (max-width: 800px) {
        .container { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 500px) {
        .container { grid-template-columns: 1fr; }
      }

      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .item {
        text-decoration: none;
        color: var(--text-primary);
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        position: relative;
        background: radial-gradient(120% 120% at 50% -20%, #1a1d24 0%, #0c0d12 100%);
        /* Default state before animation runs */
        opacity: 0;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .item:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.4);
        z-index: 10;
      }

      .image-container {
        overflow: hidden;
        aspect-ratio: 16/10;
        background-color: #0b0c0f;
        border-bottom: 1px solid var(--border-color);
      }

      .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 0;
        transition: transform 0.5s ease;
        margin: 0;
        display: block;
      }

      .item:hover img {
        transform: scale(1.08); /* Premium zoom effect */
      }

      .item-content {
        padding: 20px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        position: relative;
      }

      /* Animated glow line on hover */
      .item::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .item:hover::after {
        opacity: 1;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
        gap: 12px;
      }

      .item strong {
        font-size: 1.15rem;
        font-weight: 600;
        margin: 0;
        color: #f9fafb;
        line-height: 1.3;
      }

      .year-badge {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.06);
        padding: 4px 10px;
        border-radius: 100px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        white-space: nowrap;
      }

      .desc {
        color: var(--text-secondary);
        font-size: 0.95em;
        flex-grow: 1;
        line-height: 1.5;
        transition: color 0.3s ease;
      }
      
      .item:hover .desc {
        color: #d1d5db; /* slightly brighter on hover */
      }
    </style>
  </head>
  <body>
    <a href="https://www.codewars.com/users/andrewmaxwell" target="_blank" style="position: fixed; top: 0; right: -10px; width: 300px; z-index: 2">
      <img src="https://www.codewars.com/users/andrewmaxwell/badges/large" alt="codewars"/>
    </a>
    
    <main>
      <div class="controls">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" placeholder="Search projects by name, description, or year..." />
        </div>
      </div>
      <div class="container" id="projectContainer"></div>
    </main>

    <script type="module" src="home/main.js"></script>
  </body>
</html>
