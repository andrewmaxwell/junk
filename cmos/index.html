<head>
  <style>
    body {
      margin: 0;
      display: flex;
      background-color: #121212;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: #1e1e1e;
      border-left: 1px solid #333;
      flex-grow: 1;
    }

    .material-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .material-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid #555;
    }

    #reset-button,
    #clear-button,
    #export-button {
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
      color: white;
      border: none;
      border-radius: 4px;
    }

    #reset-button {
      background-color: #f44336;
      margin-top: 20px;
    }

    #clear-button {
      background-color: #ff9800;
    }

    #export-button {
      background-color: #2196f3;
    }
  </style>
</head>

<body>
  <canvas style="width: 100vh; height: 100vh; image-rendering: pixelated; flex-shrink: 0;"></canvas>
  <div id="controls">
    <button id="reset-button">Reset to Default</button>
    <button id="clear-button">Clear Grid</button>
    <button id="export-button">Export as Template</button>
  </div>
  <script type="module" src="main.js"></script>
</body>
