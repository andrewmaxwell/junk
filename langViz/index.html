<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>langViz</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0806; overflow: hidden; }
  #viz {
    display: block; width: 100vw; height: 100vh;
    cursor: grab; touch-action: none;
  }
  #viz:active { cursor: grabbing; }
  /* tiny unobtrusive hint, fades after a few seconds */
  #hint {
    position: fixed; left: 14px; bottom: 12px;
    color: rgba(180,168,148,0.45); font: 12px ui-monospace, Menlo, monospace;
    pointer-events: none; transition: opacity 1s ease; opacity: 1;
  }
  #hint.gone { opacity: 0; }
  /* neuron inspector tooltip: what an MLP/GELU unit fires on, on hover */
  #neuronTip {
    position: fixed; z-index: 5; pointer-events: none; max-width: 290px;
    padding: 7px 10px; border-radius: 7px; display: none;
    font: 12px/1.45 ui-monospace, Menlo, monospace;
    background: rgba(12,10,8,0.94); border: 1px solid rgba(150,135,105,0.32);
    color: rgba(214,202,180,0.95); box-shadow: 0 5px 20px rgba(0,0,0,0.55);
  }
  #neuronTip .nt-h   { color: rgba(245,210,150,0.95); font-weight: 600; margin-bottom: 3px; }
  #neuronTip .nt-t   { color: rgba(238,228,208,0.96); }
  #neuronTip .nt-ctx { color: rgba(172,162,142,0.9); font-style: italic; margin-top: 4px; }
  #neuronTip .nt-dim { color: rgba(150,140,120,0.72); margin-top: 4px; font-size: 11px; }
  /* The model's input window + the token it just produced, with attention arcs
     drawn (on the #arcs overlay canvas) from the new word back to what it looked
     at. One box: the reading text and the attention view are the same thing. */
  #io {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    max-width: 94vw; box-sizing: border-box; padding: 7px 16px 48px;
    border-radius: 10px; background: rgba(12,10,8,0.55);
    border: 1px solid rgba(150,135,105,0.22);
    color: rgba(214,202,180,0.92); pointer-events: none; z-index: 3;
  }
  #io .tag {
    display: block; margin-bottom: 5px; text-align: center;
    color: rgba(158,148,128,0.7); font: 10px ui-monospace, Menlo, monospace;
    text-transform: uppercase; letter-spacing: 0.09em;
  }
  #io .tag b { color: rgba(245,200,120,0.9); }
  /* the token row — one line, scaled to fit so arcs align to real word positions */
  #strip {
    position: relative; z-index: 1; white-space: nowrap; text-align: center;
    font: 14px/1.5 ui-monospace, Menlo, monospace;
  }
  #strip .p { color: rgba(245,200,120,0.95); }   /* prompt — the input seed */
  #strip .g { color: rgba(206,196,176,0.92); }   /* generated so far */
  #strip .n {                                    /* the token just produced */
    color: #0a0806; background: rgba(255,224,150,0.96);
    border-radius: 3px; padding: 0 2px;
  }
  /* attention arcs, drawn behind the text in the padding lane below it */
  #arcs { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; }

  /* ---- world DOM layer: text/boxes that pan & zoom WITH the canvas ----
     #worldInner gets the same translate+scale transform the canvas uses, so its
     children — positioned in world coordinates — line up with the drawn network
     and scale as you zoom. CSS handles the layout the canvas can't. */
  #world { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 2; }
  #worldInner { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  /* logit-lens chip: the model's running guess at one depth of the residual stream */
  .lens {
    position: absolute; width: 210px; box-sizing: border-box;
    padding: 5px 0 4px; border-radius: 6px;
    background: rgba(10,9,7,0.82); border: 1px solid rgba(150,135,105,0.3);
    font-family: ui-monospace, Menlo, monospace; color: rgba(236,216,170,0.9);
  }
  .lens .lhdr { font-size: 9px; color: rgba(190,180,160,0.75); padding: 0 8px 3px; }
  .lens .lrow {
    position: relative; display: flex; justify-content: space-between;
    font-size: 14px; line-height: 1.25; padding: 1px 8px;
  }
  .lens .lbar { position: absolute; left: 4px; top: 1px; bottom: 1px; z-index: 0;
    background: rgba(245,150,34,0.26); border-radius: 2px; }
  .lens .ltok, .lens .lpct { position: relative; z-index: 1; }
  .lens .lrow.locked { color: rgba(255,240,198,1); font-weight: 600; }
  .lens .lrow.locked .lbar { background: rgba(255,224,150,0.32); }
  /* structural labels in the world layer (block titles, branch watermarks, column
     names + glosses, input/output, attention panel + output text). All scale with
     the network and nothing is hidden by zoom. */
  #worldInner .wl {
    position: absolute; white-space: nowrap; transform-origin: 0 0;
    font-family: ui-monospace, Menlo, monospace; letter-spacing: 0.01em;
    text-shadow: 0 1px 5px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.7);
  }
  #worldInner .wl-title    { color: rgba(234,214,174,0.96); font-weight: 600; }
  #worldInner .wl-subtitle { color: rgba(200,186,160,0.5); }
  #worldInner .wl-mark-a     { color: rgba(150,180,220,0.65); font-weight: 600; }
  #worldInner .wl-mark-a-sub { color: rgba(150,180,220,0.42); }
  #worldInner .wl-mark-m     { color: rgba(186,156,216,0.65); font-weight: 600; }
  #worldInner .wl-mark-m-sub { color: rgba(186,156,216,0.42); }
  #worldInner .wl-col   { color: rgba(210,200,180,0.95); }
  #worldInner .wl-gloss { color: rgba(198,188,168,0.74); }
  #worldInner .wl-io     { color: rgba(206,184,142,0.95); font-weight: 600; }
  #worldInner .wl-io-sub { color: rgba(206,184,142,0.5); }
  #worldInner .wl-res   { color: rgba(202,182,142,0.72); }
  #worldInner .wl-attn-cap { color: rgba(200,190,170,0.7); }
  #worldInner .wl-attn-h   { font-weight: 600; }
  #worldInner .wl-attn-tok { color: rgba(238,228,208,0.92); }
  #worldInner .wl-out          { color: rgba(240,212,162,0.92); }
  #worldInner .wl-out.sampled  { color: rgba(255,240,198,1); font-weight: 600; }
  /* zoom-in explainer plates: small wrapped paragraphs that describe one op.
     A dark plate keeps them readable over edges/nodes; they're tiny at the
     overview zoom and meant to be read after zooming into a part. */
  #worldInner .wl-desc {
    width: 150px; box-sizing: border-box; white-space: normal;
    line-height: 1.34; padding: 5px 7px; border-radius: 6px; font-weight: 400;
    color: rgba(208,198,178,0.86); letter-spacing: 0;
    background: rgba(9,8,6,0.85); border: 1px solid rgba(150,135,105,0.26);
    text-shadow: none;
  }
  #worldInner .wl-desc b { color: rgba(245,210,150,0.96); font-weight: 600; }
</style>
</head>
<body>
  <canvas id="viz"></canvas>
  <div id="world"><div id="worldInner"></div></div>
  <div id="io">
    <span class="tag">model context — <b>prompt</b> + generated · highlighted = newest · arcs = where it just looked</span>
    <div id="strip"></div>
    <canvas id="arcs"></canvas>
  </div>
  <div id="hint">drag to pan · scroll to zoom · double-click to reset · hover an MLP neuron</div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
